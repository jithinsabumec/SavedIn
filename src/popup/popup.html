<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SavedIn</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header class="header">
    <div class="logo">Saved<span>In</span></div>
    <div class="header-actions">
      <!-- Shown only while syncing -->
      <button class="cancel-btn" id="cancelBtn" aria-label="Cancel sync">Cancel</button>
      <!-- Sync icon button -->
      <button
        class="sync-btn"
        id="syncBtn"
        data-tooltip="Sync from LinkedIn"
        aria-label="Sync from LinkedIn"
      >
        <svg id="syncIcon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Search ── -->
  <div class="search-wrap">
    <input
      type="search"
      id="searchInput"
      class="search-input"
      placeholder="Search your saved posts..."
      autocomplete="off"
      spellcheck="false"
    />
  </div>

  <!-- ── Status bar ── -->
  <div class="status-bar">
    <span class="post-count" id="postCount"></span>
    <span class="status-msg" id="statusMsg"></span>
  </div>

  <!-- Shown only while syncing — reminds the user to stay on the LinkedIn tab -->
  <div class="sync-hint" id="syncHint">Stay on the LinkedIn tab</div>

  <!-- ── Results ── -->
  <div class="results" id="results">
    <div class="empty-state" id="emptyState">
      <p>No posts found</p>
      <p class="hint">Try a different search term</p>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
