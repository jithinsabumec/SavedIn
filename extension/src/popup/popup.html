<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SavedIn</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="header">
    <div class="logo">Saved<span>In</span></div>
  </header>

  <main class="popup-main">
    <p class="post-count" id="postCount">0 posts synced</p>

    <div class="sync-controls">
      <button
        class="sync-btn"
        id="syncBtn"
        data-tooltip="Sync from LinkedIn"
        aria-label="Sync from LinkedIn"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        <span>Sync</span>
      </button>

      <button class="cancel-btn" id="cancelBtn" aria-label="Cancel sync">Cancel</button>
    </div>

    <p class="sync-hint" id="syncHint">Stay on the LinkedIn tab while syncing</p>

    <section class="auth-section" id="authSectionSignedOut" hidden>
      <p class="auth-prompt">Sign in to sync across devices</p>
      <button type="button" class="auth-signin" id="signInBtn">Sign in</button>
    </section>

    <section class="auth-section" id="authSectionSignedIn" hidden>
      <p class="auth-email" id="userEmailDisplay"></p>
      <button type="button" class="auth-signout" id="signOutBtn">Sign out</button>
    </section>

    <button type="button" class="open-app-btn" id="openAppBtn">Open SavedIn</button>
  </main>

  <script type="module" src="popup.js"></script>
</body>
</html>
