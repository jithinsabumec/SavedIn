# Cloudflare Pages — monorepo root
#
# Git-connected Pages:
#   Build command:          npm run cf:pages:build
#   Build output directory: web/dist
#   Deploy command:         (leave EMPTY — Pages uploads web/dist automatically)
#
# Do NOT use "wrangler deploy" here: that is for Workers and fails in this repo
# (monorepo root detection and/or extension Vite 5 vs Workers+Vite integration).
# If you cannot clear "Deploy command": npm run deploy (pages deploy), not wrangler deploy.
# Manual CI: wrangler pages deploy web/dist --project-name=…
#
# Set VITE_* env vars in the Pages dashboard (Convex, Clerk, extension id).

name = "savedin-web"
compatibility_date = "2024-01-01"
pages_build_output_dir = "web/dist"
